<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora Tecnología  Ligorria</title>
    <style>
        html,body{
            height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f2f5;
        }
        body{
            display: flex;
            flex-direction: column;
            text-align: center;
        }  
        header{
            padding: 40px 20px;
            background-color: rgb(9, 2, 72);
        }
        h1 {
            color: #fff;
            font-size: 2.5rem;
            text-transform: uppercase;
            /* Múltiples capas de sombra para crear el resplandor */
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #262aff,
                0 0 82px #2d26ff,
                0 0 92px #2626ff;
        }
        .semana {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            margin: 25px auto; 
            max-width: 850px;
            text-align: left;
            
            /* Sombra ultra suave y difusa */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            
            /* Borde lateral magenta fino */
            border-left: 5px solid #ff00ff; 
            
            transition: all 0.3s ease;
        }

        .semana:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(38, 42, 255, 0.2);
        }

        .semana h2 {
            margin-top: 0;
            color: rgb(9, 2, 72);
        }
        main{
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            border-top: 1px solid rgb(78, 66, 213);
            background-color: rgb(182, 209, 255);
        }
        footer img {
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        footer img:hover {
            transform: scale(1.2); /* Se agranda un 20% */
        }
        @media (max-width:600px){
            footer {
                flex-direction: column;
                gap: 15px
                padding:20px
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Encabezado de mi pagina web</h1>
    </header>
    <main>
        <div class="semana">
            <h2>Semana 1: Introduccion Arduino</h2>
            <p>Es una plataforma que nos ayuda en la creacion electronica de código abierto basada en hardware y software libres y faciles de usar.</p>
            <iframe src="Arduino.pdf" width="100%" height="400px" style="border: none; margin-top: 20px;">
        Tu navegador no soporta la visualización de PDFs. 
        <a href="ligorria/arduino.pdf">Haz clic aquí para descargarlo.</a>
    </iframe>
        </div>

        <div class="semana">
            <div class="texto-semana"></div>
            <h2>Semana 2</h2>
            <p>El video contiene la simulacion de mi proyecto realizado en tinkercard</p>
            <video width="100%" height="auto" controls style="border-radius: 10px; margin-top: 15px;">
            <source src="ligorria/arduino.mp4" type="video/mp4">
        </video>
        </div>
    </div>
    </main>
    <footer>
        <span>2026 @Aaronlig8</span>
        <img src="https://www.capouilliez.edu.gt/assets/img/logo.png" alt="" width="" height="">
    </footer>
</body>
</html>
